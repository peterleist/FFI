services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pefi
      POSTGRES_USER: pefi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pefi_secret_change_me}
    ports:
      # Exposed so local `npm run dev` can connect to the same database
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pefi -d pefi"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Schema migration (runs once, then exits) ──────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://pefi:${POSTGRES_PASSWORD:-pefi_secret_change_me}@db:5432/pefi
      DIRECT_URL:   postgresql://pefi:${POSTGRES_PASSWORD:-pefi_secret_change_me}@db:5432/pefi
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Next.js app ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://pefi:${POSTGRES_PASSWORD:-pefi_secret_change_me}@db:5432/pefi
      DIRECT_URL:   postgresql://pefi:${POSTGRES_PASSWORD:-pefi_secret_change_me}@db:5432/pefi
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local
